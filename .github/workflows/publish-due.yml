name: publish-due

# ปล่อยบทความที่ถึงเวลา — ยิงทุก ~10 นาที
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # กดรันเองได้จากแท็บ Actions

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Call publish-due endpoint
        run: |
          curl -fsS -X POST "${SITE_URL}/api/publish-due" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            --max-time 60
        env:
          # ตั้งค่าใน GitHub repo → Settings → Secrets and variables → Actions
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
